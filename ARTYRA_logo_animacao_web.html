<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>ARTYRA Logo Animation</title>
<style>
body{margin:0;background:#000;display:grid;place-items:center;min-height:100vh}
.logo{width:min(70vw,700px);animation:fade 1.4s ease both}
@keyframes fade{from{opacity:0;transform:translateY(20px) scale(.96);filter:blur(8px)}to{opacity:1;transform:none;filter:none}}
</style>
</head>
<body>
<img class="logo" src="../01_LOGO_PRINCIPAL/ARTYRA_logo_principal_preto_2000.png">
</body>
</html>
